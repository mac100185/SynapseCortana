name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libasound2-dev pkg-config librsvg2-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download models (TTS + STT + GStreamer)
        run: |
          chmod +x tools/download_models.sh
          ./tools/download_models.sh

      - name: Build AppImage + DEB
        run: cd src-tauri && cargo tauri build --bundles appimage,deb

      - name: Rename AppImage (remove spaces)
        run: |
          cd src-tauri/target/release/bundle/appimage/
          for f in *\ *.AppImage; do mv "$f" "${f// /}"; done

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: true

      - name: Upload DEB to release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/deb/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download models (via Git Bash)
        shell: bash
        run: |
          chmod +x tools/download_models.sh
          # En Windows, download_models.sh no puede copiar plugins de GStreamer
          # (no existen), pero sí puede descargar los modelos TTS y STT.
          # Los plugins de GStreamer no son necesarios en Windows (WebView2
          # incluye su propio motor de audio).
          # Crear estructura de directorios necesaria.
          mkdir -p src-tauri/resources/voices src-tauri/resources/stt-models

          # Descargar voz TTS
          if [ ! -f src-tauri/resources/voices/es_AR-daniela-high/es_AR-daniela-high.onnx ]; then
            echo "Descargando voz TTS..."
            TMPDIR=$(mktemp -d)
            curl -sL -o "$TMPDIR/voice.tar.bz2" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-es_AR-daniela-high.tar.bz2"
            mkdir -p src-tauri/resources/voices/es_AR-daniela-high
            tar xjf "$TMPDIR/voice.tar.bz2" -C src-tauri/resources/voices/es_AR-daniela-high --strip-components=1
            rm -rf "$TMPDIR"
          fi

          # Descargar modelo STT (solo int8, más pequeño)
          if [ ! -f src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/medium-encoder.int8.onnx ]; then
            echo "Descargando modelo STT Whisper medium..."
            TMPDIR=$(mktemp -d)
            curl -sL -o "$TMPDIR/medium.tar.bz2" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-whisper-medium.tar.bz2"
            mkdir -p src-tauri/resources/stt-models/sherpa-onnx-whisper-medium
            tar xjf "$TMPDIR/medium.tar.bz2" -C "$TMPDIR"
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-decoder.int8.onnx" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-encoder.int8.onnx" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-tokens.txt" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            rm -rf "$TMPDIR"
          fi

          echo "Modelos descargados."

      - name: Build NSIS installer
        run: cd src-tauri && cargo tauri build --bundles nsis

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Download models (TTS + STT)
        run: |
          chmod +x tools/download_models.sh
          # En macOS, los plugins de GStreamer no son necesarios
          # (WebKit nativo de macOS incluye su propio motor de audio).
          # Solo descargamos TTS y STT.
          mkdir -p src-tauri/resources/voices src-tauri/resources/stt-models

          # Voz TTS
          if [ ! -f src-tauri/resources/voices/es_AR-daniela-high/es_AR-daniela-high.onnx ]; then
            echo "Descargando voz TTS..."
            TMPDIR=$(mktemp -d)
            curl -sL -o "$TMPDIR/voice.tar.bz2" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-es_AR-daniela-high.tar.bz2"
            mkdir -p src-tauri/resources/voices/es_AR-daniela-high
            tar xjf "$TMPDIR/voice.tar.bz2" -C src-tauri/resources/voices/es_AR-daniela-high --strip-components=1
            rm -rf "$TMPDIR"
          fi

          # Modelo STT
          if [ ! -f src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/medium-encoder.int8.onnx ]; then
            echo "Descargando modelo STT Whisper medium..."
            TMPDIR=$(mktemp -d)
            curl -sL -o "$TMPDIR/medium.tar.bz2" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-whisper-medium.tar.bz2"
            mkdir -p src-tauri/resources/stt-models/sherpa-onnx-whisper-medium
            tar xjf "$TMPDIR/medium.tar.bz2" -C "$TMPDIR"
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-decoder.int8.onnx" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-encoder.int8.onnx" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            cp "$TMPDIR/sherpa-onnx-whisper-medium/medium-tokens.txt" src-tauri/resources/stt-models/sherpa-onnx-whisper-medium/
            rm -rf "$TMPDIR"
          fi

          echo "Modelos descargados."

      - name: Build DMG (Apple Silicon)
        run: |
          rustup target add aarch64-apple-darwin
          cd src-tauri && cargo tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
